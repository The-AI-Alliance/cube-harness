name: Cube CI (fast v2)

# For each cube in cubes/, installs it with `uv pip install -e` and runs `cube test <entry-point-name>`.
# After install, importlib.metadata resolves the cube.benchmarks entry-point name (same as `cube list`).
# All cubes are tested on every run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      cubes: ${{ steps.discover.outputs.cubes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - id: discover
        run: |
          dirs=$(find cubes/ -mindepth 1 -maxdepth 1 -type d | xargs -I{} basename {} | sort)
          echo "cubes=$(echo "$dirs" | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: needs.discover.outputs.cubes != '[]' && needs.discover.outputs.cubes != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        cube: ${{ fromJson(needs.discover.outputs.cubes) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install
        working-directory: cubes/${{ matrix.cube }}
        run: uv sync

      - name: Test
        working-directory: cubes/${{ matrix.cube }}
        run: |
          cube_names=$(uv run python -c "
          import importlib.metadata, tomllib
          pkg = tomllib.load(open('pyproject.toml','rb'))['project']['name']
          eps = importlib.metadata.entry_points(group='cube.benchmarks')
          print('\n'.join(ep.name for ep in eps if ep.dist.name == pkg))
          ")
          for cube_name in $cube_names; do
            uv run cube test "$cube_name"
          done
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
