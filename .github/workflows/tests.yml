name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-22.04  # Pin to 22.04 - ubuntu-latest (24.04) has libasound2 package issues with Playwright

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure git credentials
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: make ci-install

      # Cross-repo dep override: cube-harness's swe-* and terminalbench cubes
      # import cube.tools.terminal (TerminalTool) which is on cube-standard's dev
      # branch but not yet in a published release. The convention is to keep the
      # PyPI pin in pyproject.toml and signal cross-repo deps via the PR body's
      # `Depends-on:` line — but no automation reads that yet, so the override
      # is hard-coded here. TODO: remove once cube-standard ships an rc with
      # cube.tools.terminal and update pyproject pins to `>=0.1.0rc<N>`.
      - name: Override cube-standard with dev branch (cross-repo dep)
        run: uv pip install --force-reinstall --no-deps 'cube-standard[docker] @ git+https://github.com/The-AI-Alliance/cube-standard.git@dev'

      # --no-sync on the three uv run invocations below preserves the cube-standard@dev
      # override above. Without it, `uv run` re-syncs the venv back to the lockfile
      # state and reverts cube-standard to PyPI rc8, which doesn't have cube.tools.terminal.
      - name: Run tests
        run: uv run --no-sync pytest -n 10 tests/ -v

      - name: Install Playwright browsers
        run: uv run --no-sync playwright install chromium

      - name: Run integration tests
        run: uv run --no-sync pytest tests/ -m integration -v
