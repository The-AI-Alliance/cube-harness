name: Cube CI (fast)

# Runs `make install && make test` for each cube in cubes/.
# On PRs, only cubes whose files changed are tested.
# On push to main, all cubes are tested.
# No workflow change needed when adding a new cube.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      cubes: ${{ steps.discover.outputs.cubes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - id: discover
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            cubes=$(ls cubes/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            harness_changed=$(git diff --name-only origin/main... | grep -cE '^src/|^\.github/workflows/cube-ci-fast\.yml' || true)
            if [ "$harness_changed" -gt 0 ]; then
              cubes=$(ls cubes/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
            else
              cubes=$(git diff --name-only origin/main... | grep '^cubes/' | cut -d/ -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          echo "cubes=$cubes" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    if: needs.discover.outputs.cubes != '[]' && needs.discover.outputs.cubes != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        cube: ${{ fromJson(needs.discover.outputs.cubes) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'

      - name: Install
        working-directory: cubes/${{ matrix.cube }}
        run: make install

      - name: Test
        working-directory: cubes/${{ matrix.cube }}
        run: make test
        env:
          HUGGING_FACE_HUB_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
